name: Secret & PII Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for secrets and PII
        run: |
          echo "=== Secret & PII Scan ==="
          FAIL=0

          # 1. AWS keys
          if grep -rn -E '(AKIA[0-9A-Z]{16}|aws_secret_access_key\s*=)' . \
            --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=.github \
            --exclude='README.md' --exclude='*.example' \
            | grep -v 'AKIAIOSFODNN7EXAMPLE' | grep -v 'aws_secret_access_key = \$'; then
            echo "::error::BLOCKED: AWS credential detected"
            FAIL=1
          fi

          # 2. Generic API keys/tokens
          if grep -rn --include='*.py' --include='*.sh' --include='*.js' --include='*.json' \
            -E '(api_key|API_KEY|token|TOKEN|secret|SECRET)\s*[=:]\s*"[A-Za-z0-9+/]{30,}={0,2}"' . --exclude-dir=.git --exclude-dir=node_modules; then
            echo "::error::BLOCKED: API key or token detected"
            FAIL=1
          fi

          # 3. Private keys
          if grep -rn -l 'BEGIN.*PRIVATE KEY' . --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=.github; then
            echo "::error::BLOCKED: Private key file detected"
            FAIL=1
          fi

          # 4. KMS key IDs (should be in config, not hardcoded)
          if grep -rn --include='*.py' --include='*.js' --include='*.ts' \
            -E 'arn:aws:kms:[a-z0-9-]+:[0-9]+:key/[a-f0-9-]+' . --exclude-dir=.git --exclude-dir=node_modules; then
            echo "::error::BLOCKED: Hardcoded KMS key ARN detected -- use config/env"
            FAIL=1
          fi

          # 5. Personal paths
          if grep -rn --include='*.py' --include='*.sh' --include='*.js' --include='*.json' \
            -E 'C:\Users\[a-zA-Z]+\' . --exclude-dir=.git --exclude-dir=node_modules --exclude='CLAUDE.md'; then
            echo "::error::BLOCKED: Personal file path detected"
            FAIL=1
          fi

          # 6. .env files with secrets
          if find . -name '.env' -not -path './.git/*' | xargs grep -l -E '(KEY|SECRET|TOKEN|PASSWORD)\s*=' 2>/dev/null; then
            echo "::error::BLOCKED: .env file with secrets detected"
            FAIL=1
          fi

          if [ "$FAIL" -eq 1 ]; then
            echo ""
            echo "=========================================="
            echo "PUSH BLOCKED: Fix the above issues first."
            echo "=========================================="
            exit 1
          fi

          echo "All checks passed."
